services:
  algorithms-engine:
    build:
      context: ./app          # all source files live in the app/ subdirectory
      dockerfile: Dockerfile
    container_name: algorithms-engine
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      # URL of the backend server that will receive the scheduling results.
      # Override via .env file or by setting the shell variable before running.
      CALLBACK_SERVER_URL: ${CALLBACK_SERVER_URL:-}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
    env_file:
      - path: .env
        required: false       # won't fail if .env doesn't exist yet
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
